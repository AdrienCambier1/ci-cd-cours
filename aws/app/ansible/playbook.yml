- name: Deploiement de la stack applicative
  hosts: app_hosts
  become: true

  vars:
    project_dir: /home/ubuntu/app-stack

  tasks:
    - name: Verifier les variables de deploiement applicatif
      ansible.builtin.assert:
        that:
          - REGISTRY_URL | default('') | string | trim | length > 0
          - REGISTRY_USER | default('') | string | trim | length > 0
          - REGISTRY_PASSWORD | default('') | string | trim | length > 0
          - MYSQL_PASSWORD | default('') | string | trim | length > 0
          - MYSQL_DATABASE | default('') | string | trim | length > 0
          - MYSQL_HOST | default('') | string | trim == 'db'
          - MYSQL_USER | default('') | string | trim == 'root'
          - AUTH_USERNAME | default('') | string | trim | length > 0
          - AUTH_PASSWORD | default('') | string | trim | length > 0
        fail_msg: "Variables invalides: pour la DB Docker interne, utilise MYSQL_HOST=db et MYSQL_USER=root, avec les secrets registry/auth non vides."
        quiet: true

    - name: Installer Docker et les outils requis
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Ajouter l'utilisateur ubuntu au groupe docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Creer le dossier du projet applicatif
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Recuperer le certificat du registry pour Docker
      ansible.builtin.shell: |
        set -o pipefail
        echo | openssl s_client -connect {{ REGISTRY_URL }} 2>/dev/null | \
          sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' \
          > /tmp/registry-ca.crt
      args:
        executable: /bin/bash
        creates: /tmp/registry-ca.crt

    - name: Creer le dossier des certificats Docker
      ansible.builtin.file:
        path: /etc/docker/certs.d/{{ REGISTRY_URL }}
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Installer le certificat du registry dans le trust store Docker
      ansible.builtin.copy:
        src: /tmp/registry-ca.crt
        dest: /etc/docker/certs.d/{{ REGISTRY_URL }}/ca.crt
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: Redemarrer Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Reinitialiser la connexion SSH
      ansible.builtin.meta: reset_connection

    - name: Authentification au registre Docker prive
      ansible.builtin.command:
        cmd: >-
          docker login {{ REGISTRY_URL }}
          --username {{ REGISTRY_USER }}
          --password-stdin
        stdin: "{{ REGISTRY_PASSWORD }}"
      no_log: true

    - name: Copier les scripts d'initialisation de la base de donnees
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../database/"
        dest: "{{ project_dir }}/database/"
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Generer le docker-compose applicatif
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Creer le fichier .env applicatif
      ansible.builtin.copy:
        dest: "{{ project_dir }}/.env"
        content: |
          MYSQL_PASSWORD={{ MYSQL_PASSWORD }}
          MYSQL_PORT=3306
          MYSQL_DATABASE={{ MYSQL_DATABASE }}
          MYSQL_USER={{ MYSQL_USER }}
          MYSQL_HOST={{ MYSQL_HOST }}
          AUTH_USERNAME={{ AUTH_USERNAME }}
          AUTH_PASSWORD={{ AUTH_PASSWORD }}
          API_URL=http://{{ inventory_hostname }}:8000
        owner: ubuntu
        group: ubuntu
        mode: "0640"
      no_log: true

    - name: Demarrer la stack applicative
      block:
        - name: Precharger les images Docker
          ansible.builtin.command:
            cmd: docker compose pull
            chdir: "{{ project_dir }}"
          register: compose_pull
          changed_when: compose_pull.rc == 0

        - name: Demarrer la base de donnees
          ansible.builtin.command:
            cmd: docker compose up -d db
            chdir: "{{ project_dir }}"
          register: compose_db
          changed_when: >-
            'Started' in compose_db.stderr or
            'Created' in compose_db.stderr or
            'Recreated' in compose_db.stderr or
            'Running' in compose_db.stdout

        - name: Attendre que MySQL soit pret
          ansible.builtin.command:
            cmd: >-
              docker compose exec -T db sh -c
              'mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'
            chdir: "{{ project_dir }}"
          register: mysql_ping
          retries: 30
          delay: 10
          until: mysql_ping.rc == 0
          changed_when: false

        - name: Demarrer l'API
          ansible.builtin.command:
            cmd: docker compose up -d api
            chdir: "{{ project_dir }}"
          register: compose_api
          changed_when: >-
            'Started' in compose_api.stderr or
            'Created' in compose_api.stderr or
            'Recreated' in compose_api.stderr or
            'Running' in compose_api.stdout

        - name: Attendre que l'API soit prete
          ansible.builtin.command:
            cmd: >-
              docker compose exec -T api python -c
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/users', timeout=5)"
            chdir: "{{ project_dir }}"
          register: api_health
          retries: 30
          delay: 5
          until: api_health.rc == 0
          changed_when: false

        - name: Demarrer le frontend
          ansible.builtin.command:
            cmd: docker compose up -d web
            chdir: "{{ project_dir }}"
          register: compose_web
          changed_when: >-
            'Started' in compose_web.stderr or
            'Created' in compose_web.stderr or
            'Recreated' in compose_web.stderr or
            'Running' in compose_web.stdout

        - name: Attendre que le frontend soit pret
          ansible.builtin.command:
            cmd: docker compose exec -T web curl --fail http://localhost:80
            chdir: "{{ project_dir }}"
          register: web_health
          retries: 12
          delay: 5
          until: web_health.rc == 0
          changed_when: false

      rescue:
        - name: Afficher l'etat Docker Compose
          ansible.builtin.command:
            cmd: docker compose ps
            chdir: "{{ project_dir }}"
          register: compose_ps
          changed_when: false
          failed_when: false

        - name: Afficher les logs Docker Compose
          ansible.builtin.command:
            cmd: docker compose logs --tail=150
            chdir: "{{ project_dir }}"
          register: compose_logs
          changed_when: false
          failed_when: false

        - name: Echouer avec le diagnostic Docker
          ansible.builtin.fail:
            msg: |
              Le demarrage de la stack applicative a echoue.

              Etat Docker Compose:
              {{ compose_ps.stdout }}

              Logs Docker Compose:
              {{ compose_logs.stdout }}
