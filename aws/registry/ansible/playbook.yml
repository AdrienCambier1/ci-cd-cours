- name: Deploiement d'un Registry Docker securise
  hosts: registry_hosts
  become: true

  vars:
    project_dir: /home/ubuntu/registry-stack
    public_ip: "{{ inventory_hostname }}"

  tasks:
    - name: Installer Docker et les outils requis
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils
          - openssl
        state: present

    - name: Ajouter l'utilisateur ubuntu au groupe docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Creer les dossiers du Registry et de Nginx
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/nginx"
        - "{{ project_dir }}/certs"

    - name: Creer le compte Registry admin
      ansible.builtin.command:
        argv:
          - htpasswd
          - -Bbc
          - "{{ project_dir }}/auth/registry.password"
          - "{{ REGISTRY_USER | default('admin', true) }}"
          - "{{ REGISTRY_PASSWORD | default('admin', true) }}"
      no_log: true

    - name: Proteger le fichier de mots de passe
      ansible.builtin.file:
        path: "{{ project_dir }}/auth/registry.password"
        owner: ubuntu
        group: ubuntu
        mode: "0640"

    - name: Creer le certificat SSL auto-signe (A la volee)
      ansible.builtin.command:
        cmd: >
          openssl req -x509 -nodes -days 365 
          -newkey rsa:2048 
          -keyout {{ project_dir }}/certs/registry.key 
          -out {{ project_dir }}/certs/registry.crt 
          -subj "/CN={{ public_ip }}" 
          -addext "subjectAltName=IP:{{ public_ip }}"
        creates: "{{ project_dir }}/certs/registry.crt"

    - name: Proteger la cle privee SSL
      ansible.builtin.file:
        path: "{{ project_dir }}/certs/registry.key"
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Publier le certificat SSL
      ansible.builtin.file:
        path: "{{ project_dir }}/certs/registry.crt"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copier le template de configuration Nginx
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ project_dir }}/nginx/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copier le template Docker Compose
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Demarrer la stack Registry
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ project_dir }}"
      register: compose_up
      changed_when: >-
        'Started' in compose_up.stderr or
        'Created' in compose_up.stderr or
        'Recreated' in compose_up.stderr or
        'Running' in compose_up.stdout
