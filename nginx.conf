events {
    worker_connections 1024;
}

http {
    # Requis pour pouvoir pousser (push) des images Docker volumineuses sans erreur 413
    client_max_body_size 2G;

    server {
        # Écoute sur le port sécurisé avec SSL activé
        listen 443 ssl;
        server_name {{ public_ip }};

        # Chemins vers les certificats générés par Ansible (à l'intérieur du conteneur Nginx)
        ssl_certificate /etc/nginx/certs/registry.crt;
        ssl_certificate_key /etc/nginx/certs/registry.key;

        # Protocoles de sécurité recommandés
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 1. Routage intelligent pour l'API du Registre Docker
        location /v2/ {
            # Redirige vers le conteneur nommé "registry" sur son port interne 5000
            proxy_pass http://registry:5000;
            
            # En-têtes HTTP indispensables pour le protocole Docker Registry
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Évite les coupures de connexion pendant le transfert de couches lourdes
            proxy_read_timeout 900;
        }

        # 2. Routage par défaut vers l'interface Web (UI)
        location / {
            # Redirige vers le conteneur nommé "ui" sur son port interne 80
            proxy_pass http://ui:80;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # (Optionnel) Redirection automatique du HTTP (port 80) vers le HTTPS (port 443)
    server {
        listen 80;
        server_name {{ public_ip }};
        return 301 https://$host$request_uri;
    }
}
