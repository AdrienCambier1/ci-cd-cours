name: Build, Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_frontend:
    name: Build and test frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Generate documentation
        run: npm run jsdoc

      - name: Build frontend
        run: npm run build --if-present

      - name: Run frontend tests
        run: npm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v3

      - name: Create GitHub Pages SPA fallback
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          if-no-files-found: error

  test_docker_stack:
    name: Test Docker stack
    runs-on: ubuntu-latest

    needs: build_frontend

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=adrien" > .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_HOST=db" >> .env

      - name: Start Docker Compose and check services health
        run: docker compose up --build --wait --wait-timeout 180

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

  deploy_frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest

    needs: [build_frontend, test_docker_stack]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy frontend
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_backend:
    name: Deploy backend to Vercel
    runs-on: ubuntu-latest

    needs: test_docker_stack
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel Project Artifacts
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  publish_npm:
    name: Publish package to NPM
    runs-on: ubuntu-latest

    needs: build_frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build and publish package on NPM
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view ci-cd-cours@$LOCAL_VERSION version 2>/dev/null || echo "")

          if [ "$REMOTE_VERSION" != "$LOCAL_VERSION" ]; then
            npm run build-npm-ci
            npm publish
          else
            echo "Version $LOCAL_VERSION already exists on npm. Skipping publish."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_docker_images:
    name: Publish Docker images
    runs-on: ubuntu-latest

    needs: test_docker_stack
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.backend -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-cours-backend:latest .
          docker build -f Dockerfile.frontend -t ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-cours-frontend:latest .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-cours-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-cours-frontend:latest
