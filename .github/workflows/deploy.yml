name: Deploy

on:
  workflow_dispatch:

jobs:
  build_and_publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker for self-signed registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["${{ secrets.REGISTRY_URL }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to private Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -f Dockerfile.backend -t ${{ secrets.REGISTRY_URL }}/backend:latest .
          docker push ${{ secrets.REGISTRY_URL }}/backend:latest

      - name: Build and push frontend image
        env:
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          docker build \
            --build-arg AUTH_USERNAME="${AUTH_USERNAME}" \
            --build-arg AUTH_PASSWORD="${AUTH_PASSWORD}" \
            --build-arg API_URL="${API_URL}" \
            -f Dockerfile.frontend \
            -t ${{ secrets.REGISTRY_URL }}/frontend:latest \
            .
          docker push ${{ secrets.REGISTRY_URL }}/frontend:latest

  provision_and_deploy:
    name: Provision infrastructure and deploy
    runs-on: ubuntu-latest
    needs: build_and_publish
    outputs:
      instance_ip: ${{ steps.terraform.outputs.instance_ip }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        id: terraform
        run: |
          terraform apply -auto-approve
          echo "instance_ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT

      - name: Bridge - generate inventory
        run: |
          echo "[app_hosts]" > ansible/inventory.ini
          echo "${{ steps.terraform.outputs.instance_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=${{ github.workspace }}/infra/app-key-terraform.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> ansible/inventory.ini

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
        run: |
          ansible-playbook -i inventory.ini playbook.yml \
            -e REGISTRY_URL="${REGISTRY_URL}" \
            -e REGISTRY_USER="${REGISTRY_USER}" \
            -e REGISTRY_PASSWORD="${REGISTRY_PASSWORD}" \
            -e MYSQL_PASSWORD="${MYSQL_PASSWORD}" \
            -e MYSQL_DATABASE="${MYSQL_DATABASE}" \
            -e MYSQL_USER="${MYSQL_USER}" \
            -e MYSQL_HOST="${MYSQL_HOST}" \
            -e AUTH_USERNAME="${AUTH_USERNAME}" \
            -e AUTH_PASSWORD="${AUTH_PASSWORD}"

  validate:
    name: Validate deployment
    runs-on: ubuntu-latest
    needs: provision_and_deploy

    steps:
      - name: Validate frontend
        run: |
          echo "Testing frontend at http://${{ needs.provision_and_deploy.outputs.instance_ip }}"
          curl --fail --max-time 30 "http://${{ needs.provision_and_deploy.outputs.instance_ip }}" || exit 1

      - name: Validate backend API
        run: |
          echo "Testing API at http://${{ needs.provision_and_deploy.outputs.instance_ip }}:8000/users"
          curl --fail --max-time 30 "http://${{ needs.provision_and_deploy.outputs.instance_ip }}:8000/users" || exit 1
