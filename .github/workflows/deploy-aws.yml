name: Deploy AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy_aws:
    name: Provision, build and deploy AWS
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: eu-west-3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Cleanup previous ephemeral resources
        run: |
          echo "Cleaning up previous deployment resources..."
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Terraform-App-Server" "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query "Reservations[*].Instances[*].InstanceId" --output text \
            --region "$AWS_REGION")
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Terminating old EC2 instance: $INSTANCE_ID"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID --region "$AWS_REGION"
            echo "Waiting for termination..."
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID --region "$AWS_REGION"
          fi
          echo "Deleting old key pair..."
          aws ec2 delete-key-pair --key-name app-key-terraform --region "$AWS_REGION" 2>/dev/null || true
          echo "Deleting old security group..."
          aws ec2 delete-security-group --group-name app-sg --region "$AWS_REGION" 2>/dev/null || true
          echo "Cleanup done."

      - name: Terraform init
        working-directory: aws/app/terraform
        run: terraform init

      - name: Terraform apply
        working-directory: aws/app/terraform
        id: terraform
        run: |
          terraform apply -auto-approve
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for self-signed registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["${{ secrets.REGISTRY_URL }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Verify registry is reachable
        run: |
          echo "Checking registry at ${{ secrets.REGISTRY_URL }}..."
          curl -k --fail --max-time 10 -u "${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_PASSWORD }}" \
            "https://${{ secrets.REGISTRY_URL }}/v2/" || {
            echo "ERROR: Registry is unreachable. Ensure the registry EC2 is deployed and running."
            exit 1
          }

      - name: Login to private Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -f Dockerfile.backend -t ${{ secrets.REGISTRY_URL }}/backend:latest .
          docker push ${{ secrets.REGISTRY_URL }}/backend:latest

      - name: Build and push frontend image
        env:
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          API_URL: http://${{ steps.terraform.outputs.instance_ip }}:8000
        run: |
          docker build \
            --build-arg AUTH_USERNAME="${AUTH_USERNAME}" \
            --build-arg AUTH_PASSWORD="${AUTH_PASSWORD}" \
            --build-arg API_URL="${API_URL}" \
            -f Dockerfile.frontend \
            -t ${{ secrets.REGISTRY_URL }}/frontend:latest \
            .
          docker push ${{ secrets.REGISTRY_URL }}/frontend:latest

      - name: Bridge - generate inventory
        run: |
          echo "[app_hosts]" > aws/app/ansible/inventory.ini
          echo "${{ steps.terraform.outputs.instance_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=${{ github.workspace }}/aws/app/terraform/app-key-terraform.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> aws/app/ansible/inventory.ini

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: aws/app/ansible
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
        run: |
          ansible-playbook -i inventory.ini playbook.yml \
            -e REGISTRY_URL="${REGISTRY_URL}" \
            -e REGISTRY_USER="${REGISTRY_USER}" \
            -e REGISTRY_PASSWORD="${REGISTRY_PASSWORD}" \
            -e MYSQL_PASSWORD="${MYSQL_PASSWORD}" \
            -e MYSQL_DATABASE="${MYSQL_DATABASE}" \
            -e MYSQL_USER="${MYSQL_USER}" \
            -e MYSQL_HOST="${MYSQL_HOST}" \
            -e AUTH_USERNAME="${AUTH_USERNAME}" \
            -e AUTH_PASSWORD="${AUTH_PASSWORD}"

      - name: Validate frontend
        run: |
          echo "Testing frontend at http://${{ steps.terraform.outputs.instance_ip }}"
          curl --fail --max-time 30 "http://${{ steps.terraform.outputs.instance_ip }}"

      - name: Validate backend API
        run: |
          echo "Testing API at http://${{ steps.terraform.outputs.instance_ip }}:8000/users"
          curl --fail --max-time 30 "http://${{ steps.terraform.outputs.instance_ip }}:8000/users"

      - name: Rollback - terminate EC2 on failure
        if: failure() && steps.terraform.outputs.instance_ip != ''
        run: |
          echo "Deployment failed, cleaning up EC2 instance..."
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Terraform-App-Server" "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query "Reservations[*].Instances[*].InstanceId" --output text \
            --region "$AWS_REGION")
          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            echo "Terminating EC2 instance: $INSTANCE_ID"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID --region "$AWS_REGION"
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID --region "$AWS_REGION"
          fi
          aws ec2 delete-key-pair --key-name app-key-terraform --region "$AWS_REGION" 2>/dev/null || true
          aws ec2 delete-security-group --group-name app-sg --region "$AWS_REGION" 2>/dev/null || true
          echo "Rollback cleanup done."
